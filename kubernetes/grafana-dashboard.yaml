# Grafana Dashboard Configuration
# Infrastructure Overview Dashboard

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: nebula-system
  labels:
    grafana_dashboard: "1"
data:
  infrastructure-overview.json: |
    {
      "dashboard": {
        "title": "Nebula Infrastructure Overview",
        "tags": ["nebula", "infrastructure"],
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "CPU Utilization",
            "type": "graph",
            "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
            "targets": [
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total[5m])) by (pod)",
                "legendFormat": "{{pod}}"
              }
            ]
          },
          {
            "id": 2,
            "title": "Memory Usage",
            "type": "graph",
            "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
            "targets": [
              {
                "expr": "container_memory_usage_bytes / 1024 / 1024",
                "legendFormat": "{{pod}} - MB"
              }
            ]
          },
          {
            "id": 3,
            "title": "Network I/O",
            "type": "graph",
            "gridPos": {"x": 0, "y": 8, "w": 12, "h": 8},
            "targets": [
              {
                "expr": "rate(container_network_receive_bytes_total[5m])",
                "legendFormat": "RX - {{pod}}"
              },
              {
                "expr": "rate(container_network_transmit_bytes_total[5m])",
                "legendFormat": "TX - {{pod}}"
              }
            ]
          },
          {
            "id": 4,
            "title": "Daily Cost",
            "type": "stat",
            "gridPos": {"x": 12, "y": 8, "w": 6, "h": 4},
            "targets": [
              {
                "expr": "sum(azure_cost_management_cost) by (resource_group)",
                "legendFormat": "{{resource_group}}"
              }
            ]
          },
          {
            "id": 5,
            "title": "Cluster Health",
            "type": "stat",
            "gridPos": {"x": 18, "y": 8, "w": 6, "h": 4},
            "targets": [
              {
                "expr": "kube_node_status_condition{condition=\"Ready\"}",
                "legendFormat": "{{node}}"
              }
            ]
          }
        ],
        "time": {
          "from": "now-6h",
          "to": "now"
        },
        "refresh": "30s"
      }
    }
---
# Grafana Service
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: nebula-system
  labels:
    app: grafana
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: grafana
---
# Grafana Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: nebula-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.1.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-credentials
              key: password
        - name: GF_SERVER_ROOT_URL
          value: "https://grafana.nebula.example.com"
        - name: GF_SERVER_SERVE_FROM_SUB_PATH
          value: "true"
        volumeMounts:
        - name: grafana-dashboards
          mountPath: /var/lib/grafana/dashboards
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: grafana-dashboards
        configMap:
          name: grafana-dashboards

# Prometheus Alerting Rules
apiVersion: v1
kind: ConfigMap
metadata:
  name: alerting-rules
  namespace: nebula-system
data:
  alerts.yaml: |
    groups:
    - name: nebula-alerts
      rules:
      # CPU Alerts
      - alert: HighCPUUsage
        expr: sum(rate(container_cpu_usage_seconds_total[5m])) by (pod) / sum(container_spec_cpu_quota/container_spec_cpu_period) by (pod) > 0.8
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High CPU usage on pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} has been above 80% CPU for 5 minutes"
      
      - alert: CriticalCPUUsage
        expr: sum(rate(container_cpu_usage_seconds_total[5m])) by (pod) / sum(container_spec_cpu_quota/container_spec_cpu_period) by (pod) > 0.95
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Critical CPU usage on pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} has been above 95% CPU for 2 minutes"
      
      # Memory Alerts
      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.8
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High memory usage on pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} is using above 80% of its memory limit"
      
      - alert: CriticalMemoryUsage
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.95
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Critical memory usage on pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} is using above 95% of its memory limit"
      
      # Pod Health Alerts
      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0.1
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted more than 6 times in 15 minutes"
      
      - alert: PodNotReady
        expr: kube_pod_status_ready{condition="true"} == 0
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} is not ready"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been not ready for 10 minutes"
      
      # Node Alerts
      - alert: NodeNotReady
        expr: kube_node_status_condition{condition="Ready",status="false"} == 1
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Node {{ $labels.node }} is not ready"
          description: "Node {{ $labels.node }} has been not ready for 2 minutes"
      
      - alert: NodeHighMemoryPressure
        expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Node {{ $labels.node }} has memory pressure"
          description: "Node {{ $labels.node }} is under memory pressure"
      
      # Network Alerts
      - alert: PodNetworkReceiveErrors
        expr: rate(container_network_receive_errors_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} has network receive errors"
          description: "Pod {{ $labels.pod }} is experiencing network receive errors"
      
      # Deployment Alerts
      - alert: DeploymentReplicasMismatch
        expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has mismatched replicas"
          description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has {{ $value }} unavailable replicas"
      
      # Cost Alerts
      - alert: BudgetThresholdWarning
        expr: azure_cost_management_cost > 0.8 * azure_budget_threshold
        for: 1h
        labels:
          severity: warning
          team: finance
        annotations:
          summary: "Budget warning - 80% threshold reached"
          description: "Current spending is at {{ $value }}% of budget threshold"
      
      - alert: BudgetExceeded
        expr: azure_cost_management_cost > azure_budget_threshold
        for: 1h
        labels:
          severity: critical
          team: finance
        annotations:
          summary: "Budget exceeded!"
          description: "Current spending has exceeded the budget threshold"
